<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Enhancer</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <meta name="description" content="Turn simple ideas into powerful AI prompts." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "mammoth": "https://cdn.jsdelivr.net/npm/mammoth@1.7.2/mammoth.browser.min.js",
    "xlsx": "https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js",
    "pdfjs-dist": "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs",
    "marked": "https://cdn.jsdelivr.net/npm/marked@13.0.0/lib/marked.esm.js"
  }
}
    </script>
    <style>
      /* ── Marquee ── */
      .marquee-container {
        overflow: hidden;
        -webkit-mask-image: linear-gradient(to right, transparent, #fff 8%, #fff 92%, transparent);
        mask-image: linear-gradient(to right, transparent, #fff 8%, #fff 92%, transparent);
      }
      .marquee-content {
        display: flex;
        width: fit-content;
        animation: marquee 70s linear infinite;
      }
      .marquee-container:hover .marquee-content { animation-play-state: paused; }
      @keyframes marquee {
        from { transform: translateX(0); }
        to   { transform: translateX(-50%); }
      }

      /* ── Cursor ── */
      .blinking-cursor {
        display: inline-block;
        width: 2px;
        height: 1em;
        background: #9ca3af;
        animation: blink 1s step-end infinite;
        vertical-align: text-bottom;
        margin-left: 2px;
        border-radius: 1px;
      }
      @keyframes blink { 50% { opacity: 0; } }

      /* ── Fade-in ── */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .fade-up { animation: fadeUp 0.25s ease both; }

      /* ── Slide-down (dropdown) ── */
      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .slide-down { animation: slideDown 0.18s ease both; }

      /* ── Modal ── */
      @keyframes modalIn {
        from { opacity: 0; transform: scale(0.96) translateY(8px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }
      .modal-in { animation: modalIn 0.22s ease both; }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #4b5563; }

      /* ── Rating bar transition ── */
      .rating-fill { transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
    </style>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body class="bg-[#080808] text-gray-300 font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
